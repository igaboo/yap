name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Yap.app
        run: ./build.sh

      - name: Create DMG
        run: |
          mkdir -p /tmp/yap-dmg
          cp -r build/Yap.app /tmp/yap-dmg/
          ln -s /Applications /tmp/yap-dmg/Applications
          hdiutil create -volname "Yap" -srcfolder /tmp/yap-dmg -ov -format UDZO -o "build/Yap-${{ github.ref_name }}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Yap-${{ github.ref_name }}.dmg
